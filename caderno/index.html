<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Caderno de Estudos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="topbar">
        <button id="btnAmbient">Ambientes</button>
        <input
            type="text"
            placeholder="Pesquisar"
            id="buscar"
        />
        <button id="btnPerfil">Perfil</button>

    </header>

    <div class="layout">    
        <aside class="sidebar" id="sidebar">

        </aside>

        <main class="workspace">
            <section class="workspace-header">
                <article class="novo-registro">
                    <div class="novo-header">
                        <input 
                            type="text"
                            id="materia"
                            placeholder="Matéria">
                          <input
                            type="text"
                            id="titulo"
                            placeholder="Título">
                    </div>
                    <div class="novo-body">
                        <textarea
                            id="conteudo"
                            placeholder="Comece a escrever"></textarea>
                    </div>
                </article>
            </section>
            <section class="workspace-content" id="listaRegistro">

            </section>
        </main>
        <aside class="details">
            <article class="infocontent" id="infocontent"></article>

        </aside>
    </div>

    
<script src="tools.js"></script>
<script src="model.js"></script>
<script src="storage.js"></script>
<script src="view.js"></script>
<script src="controller.js"></script>
<script src="main.js"></script>

</body>
