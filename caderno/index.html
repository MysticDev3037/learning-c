<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Caderno de Estudos</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>


<header class="topbar">

    <button id="btnAmbient">
        Ambientes
    </button>


    <input
        type="text"
        id="buscar"
        placeholder="Pesquisar"
    >


    <button id="btnPerfil">
        Perfil
    </button>

</header>




<div class="layout">


    <aside 
        class="sidebar" 
        id="sidebar">
    </aside>




    <main 
        class="workspace"
        id="workspace">



        <!-- ÁREA QUE REALMENTE ROLA -->
        <section 
            class="workspace-scroll"
            id="workspace-scroll">



            <section 
                class="workspace-header"
                id="workspace-header">


                <article class="novo-registro">


                    <div class="novo-header">


                        <input
                            type="text"
                            id="materia"
                            placeholder="Matéria"
                            list="listaMaterias"
                        >


                        <datalist id="listaMaterias">
                        </datalist>



                        <input
                            type="text"
                            id="titulo"
                            placeholder="Título"
                        >


                    </div>



                    <div class="novo-body">


                        <textarea
                            id="conteudo"
                            placeholder="Comece a escrever"
                        ></textarea>


                    </div>


                </article>


            </section>





            <section 
                class="workspace-content"
                id="workspace-content">


                <section id="listaRegistro">
                </section>


            </section>





            <section 
                id="editor"
                class="editor hidden">


                <div class="editor-header">


                    <input
                        type="text"
                        id="editMateria"
                        placeholder="Editar matéria"
                        list="listaMateriasEditor"
                    >


                    <datalist id="listaMateriasEditor">
                    </datalist>



                    <input
                        type="text"
                        id="editTitulo"
                        placeholder="Editar título"
                    >


                </div>




                <div class="editor-body">


                    <textarea
                        id="editorConteudo">
                    </textarea>


                </div>


            </section>



        </section>





        <!-- SCROLL DAY -->
        <aside class="workspace-nav" id="day-window">

            <div class="day-window">
                <ul id="day-navigation">

                </ul>
            </div>

        </aside>



    </main>





    <aside class="details">


        <article
            class="infocontent"
            id="infocontent">
        </article>


    </aside>



</div>



<script src="tools.js"></script>
<script src="model.js"></script>
<script src="storage.js"></script>
<script src="view.js"></script>
<script src="controller.js"></script>
<script src="popularBanco.js"></script>
<script src="main.js"></script>


</body>

</html>
