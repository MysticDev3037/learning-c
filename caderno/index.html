<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Caderno de Estudos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Caderno de Estudos</h1>

<div class="form">
    <input id="materia" placeholder="Matéria">
    <input id="titulo" placeholder="Título">
    <input id="conteudo" placeholder="Conteúdo">
    <button onclick="criarRegistro()">Adicionar</button>
</div>

<h2>Registros</h2>
<div id="listaRegistro"></div>

<div id="modalEditar">
    <div class="modal-content">
        <input id="editarmateria" placeholder="Matéria">
        <input id="editartitulo" placeholder="Título">
        <input id="editarconteudo" placeholder="Conteúdo">
        <button onclick="alterarRegistro()">Salvar</button>
        <button onclick="cancelarEdicao()">Cancelar</button>
    </div>  
</div>

<script src="script.js"></script>
</body>
</html>
